<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>فواتير – Pullover Fashion</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800&family=Cairo:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --gold: #B8944A;
  --gold-light: #D4AE6A;
  --gold-dark: #8A6A30;
  --brown: #5C3D1E;
  --dark-brown: #2E1A0E;
  --sand: #EDE5D8;
  --ivory: #F7F3EC;
  --cream: #FDFAF5;
  --warm-gray: #9E8E7E;
  --text-main: #1E140A;
  --text-soft: #7A6558;
  --app-bg: #1C1008;
  --panel-bg: #241508;
  --border-gold: rgba(184,148,74,0.25);
}

html, body { height: 100%; font-family: 'Cairo', 'Tajawal', sans-serif; }
body { background: var(--app-bg); color: var(--text-main); -webkit-tap-highlight-color: transparent; }

/* NAV */
.top-nav {
  background: var(--dark-brown);
  display: flex;
  border-bottom: 1px solid var(--border-gold);
  position: sticky; top: 0; z-index: 100;
}
.nav-tab {
  flex: 1; padding: 15px 10px; text-align: center;
  font-size: 13px; font-weight: 700;
  color: rgba(184,148,74,0.45);
  cursor: pointer;
  border-bottom: 2px solid transparent;
  transition: all 0.2s; letter-spacing: 0.04em;
}
.nav-tab.active { color: var(--gold-light); border-bottom-color: var(--gold); background: rgba(184,148,74,0.06); }

/* SCREENS */
.screen { display: none; }
.screen.active { display: block; }

/* FORM SCREEN */
.form-screen {
  padding: 20px 16px 90px;
  background: var(--panel-bg);
  min-height: calc(100vh - 50px);
}

.sec-title {
  font-size: 10px; letter-spacing: 0.18em; text-transform: uppercase;
  color: var(--gold); font-weight: 700; margin: 20px 0 10px;
  display: flex; align-items: center; gap: 8px;
}
.sec-title:first-child { margin-top: 0; }
.sec-title::after { content:''; flex:1; height:1px; background: var(--border-gold); }

.form-group { margin-bottom: 10px; }
label { display: block; font-size: 11px; color: rgba(184,148,74,0.6); margin-bottom: 4px; letter-spacing: 0.05em; }
input, textarea {
  width: 100%; background: rgba(255,255,255,0.05);
  border: 1px solid var(--border-gold); border-radius: 8px;
  padding: 11px 13px; font-family: inherit; font-size: 14px;
  color: #f0e6d4; direction: rtl; outline: none;
  -webkit-appearance: none; transition: border-color 0.2s, background 0.2s;
}
input:focus, textarea:focus { border-color: var(--gold); background: rgba(184,148,74,0.07); }
input::placeholder, textarea::placeholder { color: rgba(255,255,255,0.18); }

/* Item card */
.item-card {
  background: rgba(255,255,255,0.04);
  border: 1px solid var(--border-gold);
  border-radius: 12px; padding: 13px; margin-bottom: 12px;
  animation: pop 0.22s ease;
}
@keyframes pop { from{opacity:0;transform:scale(0.97)} to{opacity:1;transform:scale(1)} }

.item-card-header {
  display: flex; justify-content: space-between;
  align-items: center; margin-bottom: 11px;
}
.item-num {
  width: 24px; height: 24px; background: var(--gold-dark);
  border-radius: 50%; display: flex; align-items: center; justify-content: center;
  font-size: 11px; font-weight: 700; color: #f0ddb8;
}
.btn-del {
  background: rgba(200,60,60,0.15); border: 1px solid rgba(200,60,60,0.22);
  color: #d47070; border-radius: 6px; width: 30px; height: 30px;
  font-size: 15px; cursor: pointer; display: flex; align-items: center; justify-content: center;
}

/* Image upload zone */
.img-upload-zone {
  position: relative;
  width: 100%; min-height: 110px;
  border: 1.5px dashed var(--border-gold);
  border-radius: 10px;
  overflow: hidden;
  background: rgba(255,255,255,0.03);
  margin-bottom: 10px;
  cursor: pointer;
  transition: border-color 0.2s;
  display: flex; align-items: center; justify-content: center;
}
.img-upload-zone:hover { border-color: var(--gold); }
.img-upload-zone input[type=file] {
  position: absolute; inset: 0; opacity: 0;
  width: 100%; height: 100%; cursor: pointer;
  padding: 0; border: none; background: transparent;
}
.img-placeholder {
  display: flex; flex-direction: column; align-items: center; gap: 6px;
  pointer-events: none;
}
.img-placeholder .ico { font-size: 26px; opacity: 0.5; }
.img-placeholder .txt { font-size: 11px; color: rgba(184,148,74,0.5); letter-spacing: 0.06em; }
.img-preview {
  position: relative;
  width: 100%;
  height: auto;
  display: none;
  border-radius: 10px;
}
.img-clear-btn {
  position: absolute; top: 6px; left: 6px;
  background: rgba(30,10,5,0.75);
  border: 1px solid rgba(200,80,60,0.4);
  color: #e08080; border-radius: 50%;
  width: 26px; height: 26px; font-size: 13px;
  cursor: pointer; display: none;
  align-items: center; justify-content: center;
  z-index: 5; flex-shrink: 0;
}

.row-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }

.btn-add {
  width: 100%;
  background: rgba(184,148,74,0.08);
  border: 1.5px dashed rgba(184,148,74,0.3);
  border-radius: 10px; color: var(--gold-light);
  font-family: inherit; font-size: 13px; font-weight: 600;
  padding: 13px; cursor: pointer; margin-top: 2px;
  transition: background 0.2s;
}
.btn-add:active { background: rgba(184,148,74,0.14); }

/* Fixed generate */
.btn-generate {
  position: fixed; bottom: 0; right: 0; left: 0;
  background: linear-gradient(135deg, var(--gold-dark), var(--gold-light));
  border: none; color: var(--dark-brown);
  font-family: 'Tajawal', sans-serif; font-size: 16px;
  font-weight: 800; letter-spacing: 0.04em;
  padding: 18px; cursor: pointer; z-index: 90;
  box-shadow: 0 -4px 20px rgba(0,0,0,0.35);
}

/* PREVIEW SCREEN */
.preview-screen {
  background: #E8E2D8;
  min-height: calc(100vh - 50px);
  padding: 14px 12px 70px;
}
.preview-actions { display: flex; gap: 8px; margin-bottom: 14px; }
.btn-action {
  flex: 1; background: var(--dark-brown);
  border: 1px solid var(--border-gold); color: var(--gold-light);
  font-family: inherit; font-size: 12px; font-weight: 600;
  padding: 11px 8px; border-radius: 8px; cursor: pointer;
}

/* INVOICE */
#invoice { background: #fff; border-radius: 8px; overflow: hidden; box-shadow: 0 8px 40px rgba(0,0,0,0.18); }

/* Header */
.i-header { background: var(--dark-brown); padding: 24px 22px 18px; position: relative; overflow: hidden; }
.i-header::before { content:''; position:absolute;inset:0; background: radial-gradient(ellipse at 20% 60%, rgba(184,148,74,0.18) 0%, transparent 55%), radial-gradient(ellipse at 85% 15%, rgba(184,148,74,0.10) 0%, transparent 50%); }
.i-header-row { position:relative; display:flex; align-items:flex-start; justify-content:space-between; }
.i-brand { font-family:'Tajawal',sans-serif; font-weight:800; font-size:20px; color:var(--gold-light); letter-spacing:0.04em; }
.i-brand-sub { font-size:9px; color:rgba(184,148,74,0.5); letter-spacing:0.14em; text-transform:uppercase; margin-top:3px; }
.i-inv-label { font-size:9px; color:var(--gold); letter-spacing:0.18em; text-transform:uppercase; font-weight:600; text-align:left; }
.i-inv-num { font-family:'Tajawal',sans-serif; font-size:20px; font-weight:300; color:rgba(255,250,240,0.9); text-align:left; margin-top:2px; }
.i-divider { height:1px; background:linear-gradient(90deg,transparent,var(--gold),rgba(184,148,74,0.3),transparent); margin-top:16px; }

/* Meta */
.i-meta { background: var(--ivory); padding: 11px 18px; display: flex; gap: 0; border-bottom: 1px solid var(--sand); }
.i-meta-item { flex:1; display:flex; align-items:center; gap:7px; }
.i-meta-item + .i-meta-item { border-right: 1px solid var(--sand); padding-right: 12px; }
.i-meta-icon { width:26px;height:26px; background:var(--sand); border-radius:50%; display:flex;align-items:center;justify-content:center; font-size:11px; flex-shrink:0; }
.i-meta-lbl { font-size:8.5px; color:var(--warm-gray); letter-spacing:0.08em; text-transform:uppercase; }
.i-meta-val { font-size:11px; color:var(--text-main); font-weight:700; margin-top:1px; }

/* Body */
.i-body { padding: 16px 18px; background: #fff; }
.i-sec-lbl { font-size:9px; letter-spacing:0.16em; text-transform:uppercase; color:var(--gold-dark); font-weight:700; margin-bottom:9px; display:flex; align-items:center; gap:8px; }
.i-sec-lbl::after { content:''; flex:1; height:1px; background:var(--sand); }

/* Customer */
.i-cust { background: var(--ivory); border: 1px solid var(--sand); border-radius: 6px; padding: 12px 14px; margin-bottom: 16px; display: grid; grid-template-columns: 1fr 1fr; gap: 8px 16px; }
.i-cust-full { grid-column: 1 / -1; }
.i-cust-lbl { font-size:9px; color:var(--warm-gray); letter-spacing:0.06em; margin-bottom:2px; }
.i-cust-val { font-size:12px; color:var(--text-main); font-weight:700; line-height:1.4; }

/* Products grid */
.products-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 0; }

.prod-card {
  background: var(--ivory);
  border: 1px solid var(--sand);
  border-radius: 8px;
  overflow: hidden;
}
.prod-img {
  width: 100%;
  height: 80px;
  object-fit: contain;
  display: block;
  background: var(--sand);
}
.prod-img-placeholder {
  width: 100%; height: 80px;
  background: var(--sand);
  display: flex; align-items: center; justify-content: center;
  font-size: 24px; opacity: 0.5;
}
.prod-info { padding: 8px 10px; }
.prod-name { font-size: 11.5px; font-weight: 700; color: var(--text-main); line-height: 1.3; margin-bottom: 4px; }
.prod-meta { display: flex; justify-content: space-between; align-items: center; }
.prod-qty { font-size: 10px; color: var(--text-soft); background: var(--sand); padding: 2px 7px; border-radius: 20px; }
.prod-price { font-size: 12px; font-weight: 800; font-family: 'Tajawal',sans-serif; color: var(--brown); }
.prod-idx { display: inline-flex; align-items:center;justify-content:center; width:18px;height:18px; background:var(--dark-brown); border-radius:50%; font-size:9px; font-weight:700; color:var(--gold-light); margin-bottom:4px; }

/* Totals */
.totals-wrap { display:flex; justify-content:flex-end; margin-top:12px; }
.totals-box { width:220px; border:1px solid var(--sand); border-radius:0 0 8px 8px; overflow:hidden; }
.tot-row { display:flex; justify-content:space-between; align-items:center; padding:9px 14px; border-bottom:1px solid var(--sand); font-size:12px; }
.tot-row .lbl { color:var(--text-soft); }
.tot-row .val { font-weight:600; color:var(--text-main); font-family:'Tajawal',sans-serif; }
.tot-final { background:var(--dark-brown); padding:12px 14px; display:flex; justify-content:space-between; align-items:center; }
.tot-final .lbl { font-size:9px; letter-spacing:0.12em; text-transform:uppercase; color:var(--gold); font-weight:700; }
.tot-final .val { font-family:'Tajawal',sans-serif; font-size:18px; font-weight:800; color:var(--gold-light); }

/* Note */
.i-note { margin-top:14px; }
.i-note-card { background:linear-gradient(135deg,rgba(184,148,74,0.08),rgba(184,148,74,0.02)); border:1px solid rgba(184,148,74,0.3); border-right:3px solid var(--gold); border-radius:6px; padding:11px 13px; display:flex; align-items:flex-start; gap:9px; }
.i-note-icon { font-size:16px; line-height:1; flex-shrink:0; margin-top:1px; }
.i-note-txt { font-size:12px; color:var(--text-main); line-height:1.6; }
.i-note-txt strong { color:var(--brown); font-weight:700; }

/* Footer */
.i-footer { background:var(--dark-brown); padding:14px 18px; display:flex; align-items:center; justify-content:space-between; margin-top:16px; }
.i-footer-brand { font-family:'Tajawal',sans-serif; font-weight:700; font-size:13px; color:var(--gold); }
.i-footer-sub { font-size:10px; color:rgba(184,148,74,0.4); letter-spacing:0.08em; margin-top:2px; }
.dots { display:flex; gap:5px; }
.dot { width:5px;height:5px; border-radius:50%; }
.dot:nth-child(1){background:var(--gold-dark);}
.dot:nth-child(2){background:var(--gold);}
.dot:nth-child(3){background:var(--gold-light);}

/* Print */
@media print {
  * { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; color-adjust: exact !important; }
  .top-nav, .preview-actions, .btn-generate { display:none!important; }
  body { background:#fff !important; margin:0; padding:0; }
  .screen { display:block!important; }
  .preview-screen { background:#fff !important; padding:0 !important; }
  #invoice { box-shadow:none !important; width:100% !important; }
  .form-screen { display:none!important; }
  .i-header { background: var(--dark-brown) !important; }
  .i-meta { background: var(--ivory) !important; }
  .i-cust { background: var(--ivory) !important; }
  .i-body { background: #fff !important; }
  .i-footer { background: var(--dark-brown) !important; }
  .tot-final { background: var(--dark-brown) !important; }
  thead tr { background: var(--dark-brown) !important; }
  tbody tr:nth-child(even) { background: rgba(237,229,216,0.5) !important; }
  .prod-card { background: var(--ivory) !important; border: 1px solid var(--sand) !important; }
  .prod-img-placeholder { background: var(--sand) !important; }
  .i-note-card { background: linear-gradient(135deg,rgba(184,148,74,0.08),rgba(184,148,74,0.02)) !important; }
  .r-idx { background: var(--sand) !important; }
}

::-webkit-scrollbar { width:4px; }
::-webkit-scrollbar-thumb { background:rgba(184,148,74,0.2); border-radius:2px; }
</style>
</head>
<body>

<div class="top-nav">
  <div class="nav-tab active" id="tab-form" onclick="switchTab('form')">📝 إدخال البيانات</div>
  <div class="nav-tab" id="tab-preview" onclick="switchTab('preview')">👁 معاينة الفاتورة</div>
</div>

<!-- FORM -->
<div class="screen active form-screen" id="screen-form">

  <div class="sec-title">بيانات الزبون</div>

  <div class="form-group">
    <label>الاسم الكامل</label>
    <input type="text" id="custName" placeholder="مثال: مصطفى أحمد">
  </div>
  <div class="form-group">
    <label>العنوان</label>
    <input type="text" id="custAddress" placeholder="مثال: الموصل – مجمع راما">
  </div>
  <div class="row-2" style="gap:10px;margin-bottom:10px;">
    <div class="form-group" style="margin:0">
      <label>رقم الهاتف</label>
      <input type="tel" id="custPhone" placeholder="07xxxxxxxxx" style="direction:ltr;text-align:right;">
    </div>
    <div class="form-group" style="margin:0">
      <label>رقم الفاتورة</label>
      <input type="text" id="invNumber" placeholder="PF-001">
    </div>
  </div>

  <div class="sec-title">المنتجات</div>
  <div id="itemsList"></div>
  <button class="btn-add" onclick="addItem()">＋ إضافة منتج</button>

  <div class="sec-title" style="margin-top:18px;">إضافات</div>
  <div class="row-2" style="gap:10px;margin-bottom:10px;">
    <div class="form-group" style="margin:0">
      <label>رسوم التوصيل (د.ع)</label>
      <input type="number" id="delivery" placeholder="6000" value="6000">
    </div>
    <div class="form-group" style="margin:0">
      <label>حالة الطلب</label>
      <input type="text" id="status" placeholder="قيد التنفيذ" value="قيد التنفيذ">
    </div>
  </div>
  <div class="form-group">
    <label>ملاحظة للزبون (اختياري)</label>
    <textarea id="note" rows="2" placeholder="مثال: لديك خصم 10,000 دينار في طلبك القادم 🤎"></textarea>
  </div>

</div>

<!-- PREVIEW -->
<div class="screen preview-screen" id="screen-preview">
  <div class="preview-actions">
    <button class="btn-action" onclick="window.print()">🖨️ طباعة / PDF</button>
    <button class="btn-action" onclick="switchTab('form')">✏️ تعديل</button>
  </div>
  <div id="invoice">
    <div style="padding:60px 20px;text-align:center;color:rgba(107,79,58,0.4);background:#fff;">
      <div style="font-size:40px;margin-bottom:10px;">📄</div>
      <div style="font-family:'Tajawal',sans-serif;font-size:16px;font-weight:700;margin-bottom:6px;">لا توجد فاتورة بعد</div>
      <div style="font-size:12px;">ارجع لتبويب إدخال البيانات واضغط توليد</div>
    </div>
  </div>
</div>

<button class="btn-generate" id="genBtn" onclick="generate()">⚡ توليد الفاتورة</button>

<script>
// ── State ──
let items = [{ name:'', qty:'', price:'', imgData: null }];

function renderItems() {
  const list = document.getElementById('itemsList');
  list.innerHTML = '';
  items.forEach((it, i) => {
    const d = document.createElement('div');
    d.className = 'item-card';
    d.innerHTML = `
      <div class="item-card-header">
        <span class="item-num">${i+1}</span>
        ${items.length > 1
          ? `<button class="btn-del" onclick="delItem(${i})">✕</button>`
          : '<span></span>'}
      </div>

      <!-- Image upload -->
      <label style="margin-bottom:5px;">صورة المنتج (اختياري)</label>
      <div class="img-upload-zone" id="zone-${i}">
        <input type="file" accept="image/*" onchange="handleImg(event,${i})">
        <div class="img-placeholder" id="placeholder-${i}">
          <div class="ico">🖼️</div>
          <div class="txt">اضغط لرفع صورة</div>
        </div>
        <img class="img-preview" id="preview-${i}" src="" alt="">
        <button class="img-clear-btn" id="clear-${i}" onclick="clearImg(event,${i})">✕</button>
      </div>

      <div class="form-group" style="margin-bottom:8px">
        <label>اسم المنتج</label>
        <input type="text" placeholder="مثال: تراك نسائي قطن" value="${it.name}"
          oninput="items[${i}].name=this.value">
      </div>
      <div class="row-2">
        <div>
          <label>الكمية</label>
          <input type="text" placeholder="درزن / نص درزن" value="${it.qty}"
            oninput="items[${i}].qty=this.value">
        </div>
        <div>
          <label>السعر (د.ع)</label>
          <input type="number" placeholder="78000" value="${it.price}"
            oninput="items[${i}].price=this.value">
        </div>
      </div>
    `;
    list.appendChild(d);

    // Restore image if exists
    if (it.imgData) {
      const img = document.getElementById(`preview-${i}`);
      const ph  = document.getElementById(`placeholder-${i}`);
      const cl  = document.getElementById(`clear-${i}`);
      img.src = it.imgData;
      img.style.display = 'block';
      ph.style.display  = 'none';
      cl.style.display  = 'flex';
    }
  });
}

function handleImg(e, i) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    items[i].imgData = ev.target.result;
    const img = document.getElementById(`preview-${i}`);
    const ph  = document.getElementById(`placeholder-${i}`);
    const cl  = document.getElementById(`clear-${i}`);
    img.src = ev.target.result;
    img.style.display = 'block';
    ph.style.display  = 'none';
    cl.style.display  = 'flex';
  };
  reader.readAsDataURL(file);
}

function clearImg(e, i) {
  e.stopPropagation();
  items[i].imgData = null;
  const img = document.getElementById(`preview-${i}`);
  const ph  = document.getElementById(`placeholder-${i}`);
  const cl  = document.getElementById(`clear-${i}`);
  img.src = '';
  img.style.display = 'none';
  ph.style.display  = 'flex';
  cl.style.display  = 'none';
}

function addItem() {
  items.push({ name:'', qty:'', price:'', imgData: null });
  renderItems();
  setTimeout(() => {
    const cards = document.querySelectorAll('.item-card');
    cards[cards.length-1].scrollIntoView({ behavior:'smooth', block:'center' });
  }, 50);
}

function delItem(i) {
  items.splice(i, 1);
  renderItems();
}

renderItems();

// ── Tabs ──
function switchTab(tab) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
  document.getElementById('screen-'+tab).classList.add('active');
  document.getElementById('tab-'+tab).classList.add('active');
  document.getElementById('genBtn').style.display = tab === 'form' ? 'block' : 'none';
  window.scrollTo(0,0);
}

// ── Utils ──
function fmt(n) { return Number(n||0).toLocaleString('ar-IQ') + ' د.ع'; }
function todayAr() {
  return new Date().toLocaleDateString('ar-IQ', { year:'numeric', month:'long', day:'numeric' });
}

// ── Generate ──
function generate() {
  const name     = document.getElementById('custName').value.trim()    || '—';
  const address  = document.getElementById('custAddress').value.trim() || '—';
  const phone    = document.getElementById('custPhone').value.trim()   || '—';
  const invNum   = document.getElementById('invNumber').value.trim()   || 'PF-001';
  const delivery = parseFloat(document.getElementById('delivery').value) || 0;
  const status   = document.getElementById('status').value.trim()      || 'قيد التنفيذ';
  const note     = document.getElementById('note').value.trim();

  const valid = items.filter(it => it.name.trim());
  if (!valid.length) { alert('أضف منتجاً واحداً على الأقل!'); return; }

  let subtotal = 0;
  valid.forEach(it => subtotal += parseFloat(it.price||0));
  const total = subtotal + delivery;

  // Product cards grid
  const prodCards = valid.map((it, i) => `
    <div class="prod-card">
      ${it.imgData
        ? `<img class="prod-img" src="${it.imgData}" alt="${it.name}">`
        : `<div class="prod-img-placeholder">👗</div>`}
      <div class="prod-info">
        <div class="prod-idx">${i+1}</div>
        <div class="prod-name">${it.name}</div>
        <div class="prod-meta">
          <span class="prod-qty">${it.qty||'—'}</span>
          <span class="prod-price">${fmt(it.price)}</span>
        </div>
      </div>
    </div>
  `).join('');

  const noteHtml = note ? `
    <div class="i-note">
      <div class="i-sec-lbl">ملاحظة</div>
      <div class="i-note-card">
        <div class="i-note-icon">🤎</div>
        <div class="i-note-txt">${note}</div>
      </div>
    </div>
  ` : '';

  document.getElementById('invoice').innerHTML = `
    <div class="i-header">
      <div class="i-header-row">
        <div>
          <div class="i-brand">Pullover Fashion</div>
          <div class="i-brand-sub">Fashion · Style · Quality</div>
        </div>
        <div>
          <div class="i-inv-label">Invoice · فاتورة</div>
          <div class="i-inv-num">#${invNum}</div>
        </div>
      </div>
      <div class="i-divider"></div>
    </div>

    <div class="i-meta">
      <div class="i-meta-item">
        <div class="i-meta-icon">📅</div>
        <div>
          <div class="i-meta-lbl">التاريخ</div>
          <div class="i-meta-val">${todayAr()}</div>
        </div>
      </div>
      <div class="i-meta-item">
        <div class="i-meta-icon">✅</div>
        <div>
          <div class="i-meta-lbl">الحالة</div>
          <div class="i-meta-val">${status}</div>
        </div>
      </div>
    </div>

    <div class="i-body">

      <div class="i-sec-lbl">بيانات الزبون</div>
      <div class="i-cust">
        <div class="i-cust-full">
          <div class="i-cust-lbl">الاسم الكامل</div>
          <div class="i-cust-val">${name}</div>
        </div>
        <div>
          <div class="i-cust-lbl">العنوان</div>
          <div class="i-cust-val">${address}</div>
        </div>
        <div>
          <div class="i-cust-lbl">رقم الهاتف</div>
          <div class="i-cust-val" style="direction:ltr;text-align:right;">${phone}</div>
        </div>
      </div>

      <div class="i-sec-lbl">تفاصيل الطلب</div>
      <div class="products-grid">${prodCards}</div>

      <div class="totals-wrap">
        <div class="totals-box">
          <div class="tot-row">
            <span class="lbl">المجموع الفرعي</span>
            <span class="val">${fmt(subtotal)}</span>
          </div>
          <div class="tot-row">
            <span class="lbl">رسوم التوصيل</span>
            <span class="val">${fmt(delivery)}</span>
          </div>
          <div class="tot-final">
            <span class="lbl">المجموع الكلي</span>
            <span class="val">${fmt(total)}</span>
          </div>
        </div>
      </div>

      ${noteHtml}

    </div>

    <div class="i-footer">
      <div>
        <div class="i-footer-brand">Pullover Fashion</div>
        <div class="i-footer-sub">شكراً لثقتك بنا · Thank you</div>
      </div>
      <div class="dots">
        <div class="dot"></div><div class="dot"></div><div class="dot"></div>
      </div>
    </div>
  `;

  switchTab('preview');
}
</script>
</body>
</html>
